{
  "id": "trapster-1",
  "description": "example configuration file",
  "whitelist_ips": [
    "127.0.0.1"
  ],
  "interface": "",
  "hostname": "DC01",
  "domain": "corp.local",
  "services": {
    "ftp": [
      {
        "port": 21,
        "username": null,
        "password": null,
        "banner": "Microsoft FTP Service"
      }
    ],
    "http": [
      {
        "port": 80,
        "basic_auth": false,
        "username": "admin",
        "password": "admin",
        "skin": "demo_api"
      }
    ],
    "https": [
      {
        "port": 443,
        "basic_auth": false,
        "username": "admin",
        "password": "admin",
        "skin": "demo_api",
        "common_name": "server.internal"
      }
    ],
    "ssh": [
      {
        "port": 22,
        "version": "SSH-2.0-OpenSSH_9.2p1 Debian-2+deb12u7",
        "banner": "",
        "users": {
        }
      }
    ],
    "dns": [
      {
        "port": 53,
        "target_dns": "127.0.0.1"
      }
    ],
    "vnc": [
      {
        "port": 5900,
        "version": "RFB_38"
      }
    ],
    "mysql": [
      {
        "port": 3306,
        "version": "8.4.3",
        "auth_plugin": "mysql_native_password"
      }
    ],
    "mssql": [
      {
        "port": 1433,
        "version": "2019",
        "hostname": "SQL01"
      }
    ],
    "postgres": [
      {
        "port": 5432
      }
    ],
    "ldap": [
      {
        "port": 389,
        "level": "WinThreshold"
      }
    ],
    "ldaps": [
      {
        "port": 636,
        "level": "WinThreshold"
      }
    ],
    "rdp": [
      {
        "port": 3389,
        "version": "2019",
        "ntlm_hostname": "WIN-RDP",
        "ntlm_domain": "WORKGROUP"
      }
    ],
    "telnet": [
      {
        "port": 23,
        "version": "Cisco router telnetd / IOS"
      }
    ],
    "snmp": [
      {
        "port": 161
      }
    ],
    "rsync": [
      {
        "port": 873,
        "version": "31.0",
        "modules": [
          "Backup",
          "Users"
        ]
      }
    ]
  },
  "logger": {
    "output": "terminal",
    "format": "default",
    "kwargs": {}
  }
}
